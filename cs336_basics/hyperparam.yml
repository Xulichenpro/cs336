batch_size: 4
context_length: 16
max_grad_norm: 1
eval_interval: 10
eval_iters: 5

train_bpe:
  vocab_size: 10000
  special_tokens:
    - "<|endoftext|>"
  num_processes: 16

data_loader:
  context_length: 16
  batch_size: 4

TransformerLM:
  vocab_size: 10000
  context_length: 16
  num_layers: 2
  d_model: 512
  num_heads: 16
  d_ff: 1344

RoPE:
  theta: 10000
  d_k: 32
  max_seq_len: 16

AdamW:
  lr: 1.0e-5
  eps: 1.0e-6
  weight_decay: 1.0e-6

lr_schedule:
  alpha_max: 1.0e-5
  alpha_min: 1.0e-6
  T_omiga: 100
  T_c: 300